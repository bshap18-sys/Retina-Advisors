{% if error %}
<div class="bg-red-50 border border-red-200 rounded-lg p-4 mt-6">
  <p class="text-red-700 font-medium">{{ error_message }}</p>
  <p class="text-slate-500 text-sm mt-1">Check the dispute ID and try again.</p>
</div>
{% else %}
<div class="bg-green-50 border border-green-200 rounded-lg p-4 mt-6">
  <p class="text-green-700 font-medium">Analysis complete - report renderer coming in Phase 6D.</p>
  <p class="text-slate-500 text-sm mt-1">Dispute: {{ dispute_id }}</p>
</div>
{% endif %}
