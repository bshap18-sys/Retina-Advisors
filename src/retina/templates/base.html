<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retina Advisors - Dispute Analyzer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <nav class="bg-slate-900 text-white px-6 h-12 flex items-center">
        <div class="max-w-4xl w-full mx-auto flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-[14px] font-medium">Retina Advisors</span>
                <span class="text-slate-700 mx-1 select-none">/</span>
                <span class="text-[13px] text-slate-500">Dispute Analyzer</span>
            </div>
            <span class="text-[10px] text-slate-700 uppercase tracking-widest hidden sm:block">AI Fraud Analysis</span>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto px-6 py-10">
        {% block content %}{% endblock %}
    </main>
    <script>
    (function () {
        var messages = [
            "Interrogating Stripe data...",
            "Running parallel evidence analysis...",
            "Cross-referencing behavioral signals...",
            "Synthesizing expert recommendation...",
            "Validating output quality..."
        ];
        var idx = 0;
        var timer = null;

        document.body.addEventListener('htmx:beforeRequest', function () {
            var el = document.getElementById('loading-message');
            if (!el) return;
            idx = 0;
            el.textContent = messages[0];
            timer = setInterval(function () {
                idx = (idx + 1) % messages.length;
                el.textContent = messages[idx];
            }, 3500);
        });

        document.body.addEventListener('htmx:afterRequest', function () {
            if (timer) { clearInterval(timer); timer = null; }
        });
    }());
    </script>
</body>
</html>
